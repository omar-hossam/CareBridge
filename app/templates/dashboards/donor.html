{% extends 'base.html' %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboards/main.css') }}">
{% endblock %}

{% block content %}
<main class="dashboard">

  <section class="hero">
    <h1>💖 Donor Dashboard</h1>
    <p>Make impact with transparency</p>
  </section>

  <section class="stats">
    <div class="card">💰 $500 Donated</div>
    <div class="card">📄 8 Helped</div>
    <div class="card">🏥 3 Hospitals</div>
  </section>

  <section>
    <h2>Active Requests</h2>

    <div class="request-card">
      <h3>🏥 Hospital Case</h3>
      <p>Cost: $100</p>
      <button>Donate</button>
    </div>

    <div class="request-card urgent">
      <h3>🚨 Urgent Medicine</h3>
      <p>Need immediately</p>
      <button>Contact</button>
    </div>

  </section>

</main>
{% endblock %}
